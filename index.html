<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상대강도 스크리너 (최종 안정화 버전)</title>
<style>
  :root {
    --ink: #16181d;
    --ink2: #3a3f4a;
    --line: #e3e4e8;
    --bg: #f3f4f6;
    --card: #fff;
    --up: 220,38,38;
    --down: 37,99,235;
    --gold: #b08200;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 18px 14px 60px; }
  .top { border-bottom: 2px solid var(--ink); padding-bottom: 12px; margin-bottom: 14px; }
  .eyebrow { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); font-weight: 700; }
  h1 { font-size: 22px; margin: 6px 0 0; font-weight: 800; letter-spacing: -.01em; }
  .sub { font-size: 13px; color: var(--ink2); margin: 6px 0 0; }
  
  .ctrl-panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.5;
  }
  .ctrl-row { margin-bottom: 10px; }
  .ctrl-row:last-child { margin-bottom: 0; }
  .ctrl-label { font-weight: 700; display: inline-block; width: 80px; color: var(--ink2); }
  
  label { margin-right: 14px; cursor: pointer; display: inline-flex; align-items: center; }
  input[type="radio"], input[type="checkbox"] { margin-right: 4px; accent-color: var(--ink); }
  select, input[type="date"] {
    padding: 4px 8px; border: 1px solid var(--line); border-radius: 4px;
    background: var(--card); font-size: 13px; color: var(--ink); margin-right: 10px;
  }
  
  .table-wrap {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; min-width: 820px; }
  th {
    background: #fafafa; border-bottom: 2px solid var(--line); padding: 10px 12px;
    font-weight: 700; color: var(--ink2); cursor: pointer; user-select: none;
  }
  th:hover { background: #f0f0f0; }
  td { padding: 8px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  
  .grp-hd { background: #f9fafb; font-weight: 700; color: var(--ink); }
  .grp-hd td { border-bottom: 2px solid var(--line); padding-top: 12px; padding-bottom: 12px; }
  
  .num { font-variant-numeric: tabular-nums; text-align: right; }
  th.num { text-align: right; }
  
  .badge {
    display: inline-block; padding: 2px 6px; font-size: 11px; font-weight: 600;
    border-radius: 4px; text-transform: uppercase;
  }
  .badge.kospi { background: #e0f2fe; color: #0369a1; }
  .badge.kosdaq { background: #fef3c7; color: #b45309; }
  
  .val-up { color: rgb(var(--up)); font-weight: 600; }
  .val-down { color: rgb(var(--down)); font-weight: 600; }
  .val-flat { color: var(--ink2); }
  
  .err { padding: 20px; color: rgb(var(--up)); background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px; margin: 20px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="eyebrow">Alpha Screener Tool</div>
    <h1>상대강도 스크리너</h1>
    <div class="sub" id="sub">데이터를 불러오는 중입니다...</div>
  </div>

  <div class="ctrl-panel">
    <div class="ctrl-row">
      <span class="ctrl-label">시장/섹터</span>
      <label><input type="radio" name="mkt" value="all" checked> 전체 시장</label>
      <label><input type="radio" name="mkt" value="KOSPI"> KOSPI</label>
      <label><input type="radio" name="mkt" value="KOSDAQ"> KOSDAQ</label>
      <select id="sector"><option value="all">전체 섹터</option></select>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">분석 기준</span>
      <label><input type="radio" name="mode" value="rs" checked> 지수대비 상대강도 (RS)</label>
      <label><input type="radio" name="mode" value="abs"> 절대 등락률 (Absolute)</label>
      <span style="margin-left:20px;" class="ctrl-label">그룹화</span>
      <label><input type="radio" name="groupby" value="sector" checked> 섹터별 묶기</label>
      <label><input type="radio" name="groupby" value="none"> 안 묶기 (전체 순위)</label>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">구간 설정</span>
      <span style="color:var(--ink2);">구간 A:</span>
      <input type="date" id="a1"> ~ <input type="date" id="a2">
      <span style="margin-left:14px; color:var(--ink2);">기준 끝점:</span>
      <label><input type="radio" name="endmode" value="latest" checked> 최신 데이터 기준</label>
      <label><input type="radio" name="endmode" value="pick"> 특정일 지정</label>
      <input type="date" id="endpick" style="display:none;">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">부가 기능</span>
      <label><input type="checkbox" name="price" value="on"> 현재가 표시</label>
    </div>
  </div>

  <div class="table-wrap" id="mount">
    <!-- 데이터 렌더링 영역 -->
  </div>
</div>

<script>
let DB = null;
const state = {
  mkt: 'all',
  sector: 'all',
  mode: 'rs',
  groupBy: 'sector',
  endMode: 'latest',
  showPrice: false,
  sortKey: 'score', 
  sortAsc: false
};

function bind(name, stateKey, cb) {
  const elks = document.getElementsByName(name);
  if(elks.length) {
    elks.forEach(el => {
      el.addEventListener('change', (e) => {
        if(el.type === 'radio' && !el.checked) return;
        cb(el.type === 'checkbox' ? el.checked : el.value);
        render();
      });
    });
  }
}

function avg(arr) {
  const v = arr.filter(x => x != null && !isNaN(x));
  return v.length ? v.reduce((a, b) => a + b, 0) / v.length : 0;
}

function getReturn(prices, d1, d2) {
  if(!prices || !prices[d1] || !prices[d2]) return null;
  return ((prices[d2] - prices[d1]) / prices[d1]) * 100;
}

async function init() {
  try {
    const res = await fetch("data.json");
    if(!res.ok) throw new Error("data.json 파일을 찾을 수 없습니다. (" + res.status + ")");
    DB = await res.json();
  } catch(err) {
    document.getElementById("mount").innerHTML = `
      <div class="err">
        <b>데이터 로딩 실패:</b> ${err.message}<br>
        이 파일은 <code>data.json</code>과 반드시 같은 폴더에 있어야 정상 작동합니다.
      </div>`;
    document.getElementById("sub").textContent = "데이터 로딩 실패";
    return;
  }

  // 섹터 필터 초기화
  const sectors = [...new Set(DB.universe.map(s => s.sector))].sort();
  const selS = document.getElementById("sector");
  sectors.forEach(sc => {
    const op = document.createElement("option");
    op.value = sc; op.textContent = sc;
    selS.appendChild(op);
  });

  // 날짜 데이터 추출 및 정렬 (버그 완전 해결)
  const allDates = [...new Set(Object.values(DB.prices).flatMap(p => Object.keys(p)))].sort();
  if (allDates.length === 0) {
    document.getElementById("sub").textContent = "날짜 정보가 없습니다.";
    return;
  }
  const minD = allDates[0];
  const maxD = allDates[allDates.length - 1];
  
  const a1 = document.getElementById("a1");
  const a2 = document.getElementById("a2");
  const ep = document.getElementById("endpick");
  
  a1.min = a2.min = ep.min = minD;
  a1.max = a2.max = ep.max = maxD;
  
  // 데이터 맞춤형 기본 선택값 설정
  a1.value = allDates[Math.max(0, allDates.length - 21)] || minD; 
  a2.value = allDates[Math.max(0, allDates.length - 1)] || maxD;
  ep.value = maxD;
  
  document.getElementById("sub").textContent = `실데이터: ${minD} ~ ${maxD} · 총 ${DB.universe.length}개 종목 작동 중`;
  
  [a1, a2, ep].forEach(el => el.addEventListener('change', render));
  document.getElementById("sector").addEventListener('change', (e) => { state.sector = e.target.value; render(); });
  
  bind("mkt", "mkt", v => state.mkt = v);
  bind("mode", "mode", v => state.mode = v);
  bind("groupby", "groupBy", v => state.groupBy = v);
  bind("price", "showPrice", v => state.showPrice = v);
  bind("endmode", "endMode", v => {
    state.endMode = v;
    ep.style.display = (v === "pick") ? "inline-block" : "none";
  });

  document.addEventListener('click', (e) => {
    const th = e.target.closest('th[data-key]');
    if (th) {
      const key = th.getAttribute('data-key');
      state.sortAsc = (state.sortKey === key) ? !state.sortAsc : false;
      state.sortKey = key;
      render();
    }
  });

  render();
}

function render() {
  if (!DB) return;
  const mount = document.getElementById("mount");
  const dA1 = document.getElementById("a1").value;
  const dA2 = document.getElementById("a2").value;
  
  const allDates = [...new Set(Object.values(DB.prices).flatMap(p => Object.keys(p)))].sort();
  const dEnd = (state.endMode === 'latest') ? allDates[allDates.length - 1] : document.getElementById("endpick").value;
  
  const endIdx = allDates.indexOf(dEnd);
  const dEndPrev = (endIdx > 0) ? allDates[endIdx - 1] : null;

  // 벤치마크 수익률 계산
  const kospiRetA = getReturn(DB.prices['KOSPI'], dA1, dA2) || 0;
  const kosdaqRetA = getReturn(DB.prices['KOSDAQ'], dA1, dA2) || 0;
  const kospiRet1D = dEndPrev ? (getReturn(DB.prices['KOSPI'], dEndPrev, dEnd) || 0) : 0;
  const kosdaqRet1D = dEndPrev ? (getReturn(DB.prices['KOSDAQ'], dEndPrev, dEnd) || 0) : 0;

  // [핵심 매핑 수정]: stock.code 대신 stock.ticker 구조 완전 반영
  let items = DB.universe.map(stock => {
    const ticker = stock.ticker;
    const pData = DB.prices[ticker];
    if (!pData) return null;

    const retA = getReturn(pData, dA1, dA2);
    const ret1D = dEndPrev ? getReturn(pData, dEndPrev, dEnd) : null;
    const currentPrice = pData[dEnd] || null;

    if (retA === null) return null;

    const bRetA = (stock.market === 'KOSPI') ? kospiRetA : kosdaqRetA;
    const bRet1D = (stock.market === 'KOSPI') ? kospiRet1D : kosdaqRet1D;

    const rsA = retA - bRetA;
    const rs1D = (ret1D !== null) ? (ret1D - bRet1D) : 0;

    const valA = (state.mode === 'rs') ? rsA : retA;
    const val1D = (state.mode === 'rs') ? rs1D : (ret1D || 0);

    return {
      ...stock,
      price: currentPrice,
      retA, ret1D, rsA, rs1D, valA, val1D,
      score: valA * 0.7 + val1D * 0.3
    };
  }).filter(Boolean);

  if (state.mkt !== 'all') items = items.filter(i => i.market === state.mkt);
  if (state.sector !== 'all') items = items.filter(i => i.sector === state.sector);

  const sortFunc = (a, b) => {
    let va = a[state.sortKey], vb = b[state.sortKey];
    if (va == null) return 1;
    if (vb == null) return -1;
    return state.sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  };

  let html = `<table><thead><tr>`;
  const sortSign = (key) => state.sortKey === key ? (state.sortAsc ? ' ▴' : ' ▾') : '';
  
  html += `<th style="width:60px;">순위</th>`;
  html += `<th data-key="name">종목명${sortSign('name')}</th>`;
  html += `<th style="width:90px;" data-key="market">시장${sortSign('market')}</th>`;
  html += `<th data-key="sector">섹터${sortSign('sector')}</th>`;
  if (state.showPrice) html += `<th class="num" data-key="price">현재가${sortSign('price')}</th>`;
  html += `<th class="num" data-key="val1D">${state.mode==='rs'?'1일 RS':'1일 등락'}${sortSign('val1D')}</th>`;
  html += `<th class="num" data-key="valA">${state.mode==='rs'?'구간 RS':'구간 등락'}${sortSign('valA')}</th>`;
  html += `<th class="num" data-key="score">종합점수${sortSign('score')}</th>`;
  html += `</tr></thead><tbody>`;

  if (state.groupBy === 'sector') {
    const groups = {};
    items.forEach(item => {
      if(!groups[item.sector]) groups[item.sector] = [];
      groups[item.sector].push(item);
    });

    const groupKeys = Object.keys(groups).sort((a, b) => {
      const avgA = avg(groups[a].map(x => x[state.sortKey]));
      const avgB = avg(groups[b].map(x => x[state.sortKey]));
      return state.sortAsc ? (avgA > avgB ? 1 : -1) : (avgA < avgB ? 1 : -1);
    });

    groupKeys.forEach(gKey => {
      const gItems = groups[gKey].sort(sortFunc);
      const gAvgScore = avg(gItems.map(x => x.score));
      const gAvgValA = avg(gItems.map(x => x.valA));
      
      html += `<tr class="grp-hd">`;
      html += `<td>•</td>`;
      html += `<td colspan="3">${gKey} <span style="font-weight:normal; font-size:11px; color:var(--ink2);">(${gItems.length}개 종목)</span></td>`;
      if (state.showPrice) html += `<td></td>`;
      html += `<td></td>`;
      html += `<td class="num ${gAvgValA>0?'val-up':(gAvgValA<0?'val-down':'')}">${gAvgValA.toFixed(2)}%</td>`;
      html += `<td class="num">${gAvgScore.toFixed(2)}</td>`;
      html += `</tr>`;

      gItems.forEach((item, idx) => { html += renderRow(item, idx + 1); });
    });
  } else {
    items.sort(sortFunc);
    items.forEach((item, idx) => { html += renderRow(item, idx + 1); });
  }

  html += `</tbody></table>`;
  mount.innerHTML = html;
}

function renderRow(item, rank) {
  const fNum = (v, isPct=true) => {
    if (v == null) return '-';
    const cls = v > 0 ? 'val-up' : (v < 0 ? 'val-down' : 'val-flat');
    const sign = v > 0 ? '+' : '';
    return `<span class="${cls}">${sign}${v.toFixed(2)}${isPct?'%':''}</span>`;
  };

  let r = `<tr>`;
  r += `<td class="num" style="color:var(--ink2);">${rank}</td>`;
  r += `<td><b>${item.name}</b> <span style="font-size:11px; color:var(--ink2);">${item.ticker}</span></td>`;
  r += `<td><span class="badge ${item.market.toLowerCase()}">${item.market}</span></td>`;
  r += `<td style="color:var(--ink2);">${item.sector}</td>`;
  if (state.showPrice) {
    r += `<td class="num">${item.price ? item.price.toLocaleString() + '원' : '-'}</td>`;
  }
  r += `<td class="num">${fNum(item.val1D)}</td>`;
  r += `<td class="num">${fNum(item.valA)}</td>`;
  r += `<td class="num" style="font-weight:600;">${item.score.toFixed(2)}</td>`;
  r += `</tr>`;
  return r;
}

window.onload = init;
</script>
</body>
</html>
