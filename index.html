<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상대강도 스크리너</title>
<style>
  :root{--ink:#16181d;--ink2:#3a3f4a;--line:#e3e4e8;--bg:#f3f4f6;--card:#fff;
    --up:220,38,38;--down:37,99,235;--gold:#b08200;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Roboto,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1280px;margin:0 auto;padding:18px 14px 60px;}
  .top{border-bottom:2px solid var(--ink);padding-bottom:12px;margin-bottom:14px;}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;}
  h1{font-size:22px;margin:6px 0 0;font-weight:800;letter-spacing:-.01em;}
  .sub{font-size:12px;color:var(--ink2);margin-top:6px;line-height:1.5;}
  .controls{display:flex;flex-wrap:wrap;gap:13px 16px;align-items:flex-start;margin:15px 0 13px;}
  .grp{display:flex;flex-direction:column;gap:5px;}
  .lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);font-weight:700;}
  .seg{display:inline-flex;background:#e7e8ec;border-radius:9px;padding:3px;flex-wrap:wrap;}
  .seg button{border:0;background:transparent;font:inherit;font-size:13px;font-weight:600;color:var(--ink2);
    padding:7px 13px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .seg button.on{background:var(--ink);color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  input[type=date]{font:inherit;font-size:12.5px;font-weight:600;border:1px solid var(--line);border-radius:8px;padding:6px 8px;color:var(--ink);background:#fff;}
  select.din,select#sector{font:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:9px;padding:7px 30px 7px 12px;color:var(--ink);background:#fff;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%2712%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%233a3f4a%27 stroke-width=%272.5%27><path d=%27M6 9l6 6 6-6%27/></svg>");background-repeat:no-repeat;background-position:right 10px center;min-width:120px;}
  .achip-d{border-left:3px solid rgb(var(--up));} .bchip-d{border-left:3px solid rgb(var(--down));}
  .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px;}
  table{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px;font-variant-numeric:tabular-nums;min-width:760px;}
  th,td{padding:8px 5px;text-align:right;white-space:nowrap;}
  thead th{position:sticky;top:0;background:#fafafb;font-size:11px;font-weight:700;color:var(--ink2);
    border-bottom:1px solid var(--line);cursor:pointer;user-select:none;z-index:3;vertical-align:bottom;}
  thead th:hover{color:var(--ink);}
  th.name,td.name{text-align:left;position:sticky;left:0;background:var(--card);z-index:2;min-width:140px;border-right:1px solid var(--line);}
  thead th.name{z-index:4;background:#fafafb;cursor:default;}
  th.hA{color:rgb(var(--up));} th.hB{color:rgb(var(--down));}
  th.anc{border-bottom:2px solid currentColor;} td.sep,th.sep{border-right:2px solid var(--line);}
  td.price{color:var(--ink2);} td.nowc,th.nowc{font-weight:800;color:var(--ink);}
  .tkr{font-size:10.5px;color:#9096a1;font-weight:500;margin-top:2px;}
  td.name b{font-weight:700;font-size:13.5px;}
  .rank{display:inline-block;width:15px;color:#9096a1;font-size:11px;margin-right:3px;}
  .mk{display:inline-block;font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:1.5px;}
  .mk.k{background:#eef2ff;color:#3949ab;} .mk.q{background:#fff3e0;color:#b45309;}
  .sct{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:1.5px;background:#eef7f0;color:#1f7a44;}
  tbody tr:hover td{filter:brightness(.97);}
  /* 그룹 헤더 행 */
  tr.grphead td{background:#eceef2;font-weight:800;font-size:12px;color:var(--ink);
    border-top:2px solid #d6d9df;border-bottom:1px solid #d6d9df;cursor:pointer;}
  tr.grphead td.name{background:#eceef2;}
  tr.grphead .gmk{font-size:9px;font-weight:800;padding:1px 6px;border-radius:4px;margin-right:6px;}
  tr.grphead .gcount{font-size:10px;color:#7c828e;font-weight:600;margin-left:6px;}
  tr.grphead .caret{display:inline-block;width:12px;color:#9096a1;font-size:10px;}
  /* 지수(벤치) 행 */
  tr.bm td{background:#1b1d23!important;color:#fff;font-weight:700;}
  tr.bm td.name{background:#1b1d23!important;color:#fff;} tr.bm td.name b{color:#fff;} tr.bm td.nowc{color:#fff;}
  tr.bm .tag{font-size:9px;color:#c9cdd6;margin-left:6px;border:1px solid #4a4f5c;border-radius:4px;padding:1px 5px;}
  .arrow{font-size:9px;color:var(--gold);margin-left:3px;}
  .legend{display:flex;gap:15px;margin-top:12px;font-size:11.5px;color:var(--ink2);flex-wrap:wrap;}
  .sw{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;margin-right:5px;}
  .note{font-size:11px;color:#9096a1;margin-top:16px;line-height:1.6;border-top:1px solid var(--line);padding-top:12px;}
  .broken{background:#fff8e6;border:1px solid #f0dca0;color:#8a6d1a;padding:11px 14px;border-radius:10px;font-size:12.5px;margin-top:12px;line-height:1.5;}
  .err{background:#fff4f4;border:1px solid #f3c9c9;color:#b42424;padding:14px;border-radius:10px;font-size:13px;margin:14px 0;}
.topbadge{display:inline-block;margin-left:6px;font-size:10px;font-weight:700;color:#fff;background:rgb(var(--up));padding:1px 5px;border-radius:6px;vertical-align:middle}
.rsinfo{font-size:12px;color:#6b7280;margin:0 0 10px;padding:8px 12px;background:#f7f8fa;border-radius:8px;line-height:1.5}
.sparkcell{cursor:pointer;padding:4px 8px!important}
.sparkcell:hover{background:#eef0f3}
#rsmodal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100}
#rsmodal.on{display:flex}
.rsbox{background:#fff;border-radius:14px;padding:20px;max-width:90vw;width:560px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.rsbox h3{margin:0 0 4px;font-size:17px}
.rsbox .sub{font-size:12px;color:#6b7280;margin:0 0 14px}
.rsbox .close{float:right;cursor:pointer;font-size:20px;color:#9096a1;line-height:1;border:none;background:none}
.rsbox .trend{font-size:13px;margin-top:10px;padding:8px 12px;border-radius:8px;background:#f7f8fa}
.rsperiods{display:flex;gap:6px;margin:0 0 12px}
.rsperiods button{flex:1;padding:6px 0;font-size:12px;border:1px solid #e5e7eb;background:#fff;border-radius:7px;cursor:pointer;color:#6b7280}
.rsperiods button.on{background:#111;color:#fff;border-color:#111;font-weight:600}
.msel{position:relative;display:inline-block}
.msel-btn{text-align:left;min-width:120px}
.msel-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:50;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:6px;min-width:170px;max-height:300px;overflow-y:auto}
.msel-panel.on{display:block}
.msel-panel label{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;font-size:13px;cursor:pointer;white-space:nowrap}
.msel-panel label:hover{background:#f2f4f7}
.msel-panel input{cursor:pointer;width:15px;height:15px}
.msel-panel .divider{height:1px;background:var(--line);margin:5px 0}
.msel-panel .allrow{font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="eyebrow">상대강도 스크리너 · 그룹 보기</div>
    <h1>시장·섹터별 등락률 / 지수 대비 강도</h1>
    <p class="sub" id="sub">data.json 로딩 중…</p>
  </div>

  <div class="controls">
    <div class="grp"><span class="lbl">구간① 시작</span>
      <input type="date" id="a1" class="achip-d"></div>
    <div class="grp"><span class="lbl">구간② 시작</span>
      <input type="date" id="a2" class="bchip-d"></div>
    <div class="grp"><span class="lbl">끝점 (현재가)</span>
      <div class="row"><div class="seg" id="endmode"><button data-end="last" class="on">최근</button><button data-end="pick">특정일</button></div>
      <input type="date" id="endpick" style="display:none"></div></div>
    <div class="grp"><span class="lbl">시장</span>
      <div class="seg" id="mkt"><button data-mkt="all" class="on">전체</button><button data-mkt="KOSPI">코스피</button><button data-mkt="KOSDAQ">코스닥</button></div></div>
    <div class="grp"><span class="lbl">섹터</span>
      <div class="msel" id="sectorMsel">
        <button type="button" class="din msel-btn" id="sectorBtn">전체 섹터</button>
        <div class="msel-panel" id="sectorPanel"></div>
      </div></div>
    <div class="grp"><span class="lbl">보기</span>
      <div class="seg" id="mode"><button data-mode="abs" class="on">등락률</button><button data-mode="rel">상대강도</button><button data-mode="rs">RS Score</button></div></div>
    <div class="grp"><span class="lbl">묶기</span>
      <div class="seg" id="groupby"><button data-grp="sector" class="on">섹터별</button><button data-grp="none">안 묶기</button></div></div>
    <div class="grp"><span class="lbl">가격</span>
      <div class="seg" id="price"><button data-price="on" class="on">표시</button><button data-price="off">숨김</button></div></div>
  </div>

  <div id="mount"></div>
<div id="rsmodal"><div class="rsbox"><button class="close" id="rsclose">×</button><h3 id="rstitle"></h3><p class="sub" id="rssub"></p><div class="rsperiods" id="rsperiods"><button data-days="22">1개월</button><button data-days="66">3개월</button><button data-days="132" class="on">6개월</button><button data-days="250">1년</button></div><div id="rschart"></div><div class="trend" id="rstrend"></div></div></div>

  <div class="legend">
    <span><span class="sw" style="background:rgba(220,38,38,.7)"></span>상승 / 초과</span>
    <span><span class="sw" style="background:rgba(37,99,235,.7)"></span>하락 / 부진</span>
    <span>· 헤더 클릭 = 정렬 · 그룹 헤더 클릭 = 접기 · 끝점·구간일 바꾸면 즉석 재계산</span>
  </div>
  <p class="note">※ 섹터별로 묶어 보기. 그룹 헤더의 값은 그 섹터 종목들의 <b>평균</b>입니다(섹터 자체의 강도). 종목은 그룹 안에서 정렬됩니다. 상대강도 = 종목 − 자기 시장 지수. 거래일 기준(주말·휴장 자동 건너뜀).</p>
</div>

<script>
const ROLL=[{label:"1일",key:"d1",n:1},{label:"2일",key:"d2",n:2},{label:"3일",key:"d3",n:3},{label:"1주",key:"w1",n:5},{label:"2주",key:"w2",n:10},{label:"1달",key:"M1",n:22},{label:"3달",key:"M3",n:66},{label:"6달",key:"M6",n:132}];
const RSW={w1:0.5,w3:0.3,w6:0.2};  // RS Score 가중치 (미너비니식: 최근 중시)
const COLS=[{label:"구간①",key:"a1",anc:"hA",sep:1},{label:"구간②",key:"a2",anc:"hB"},
  {label:"1일",key:"d1",sep:1},{label:"2일",key:"d2"},{label:"3일",key:"d3"},{label:"1주",key:"w1"},{label:"2주",key:"w2"},{label:"1달",key:"M1"},{label:"3달",key:"M3"},{label:"6달",key:"M6"}];
let DB=null, state={mkt:"all",sectors:[],mode:"abs",showPrice:true,sortKey:"a1",sortDir:-1,endMode:"last",groupBy:"sector",collapsed:{}};

function pct(e,s){return Math.round((e-s)/s*10000)/100;}
function datesOf(t){return Object.keys(DB.prices[t]).sort();}
function endDate(t){const ds=datesOf(t); if(state.endMode==="last")return ds[ds.length-1];
  const pick=document.getElementById("endpick").value; let r=null; for(const d of ds){ if(d<=pick)r=d; } return r||ds[ds.length-1];}
function priceAt(t,d){return DB.prices[t][d];}
function nearestOnOrBefore(t,target){const ds=datesOf(t);let r=null;for(const d of ds){if(d<=target)r=d;}return r;}
function nBack(t,endD,n){const ds=datesOf(t);const i=ds.indexOf(endD);const j=i-n;return j>=0?ds[j]:null;}

function valid(v){return v!=null && isFinite(v) && v>0;}  // 유효한 가격만
function computeReturns(t){
  const a1=document.getElementById("a1").value, a2=document.getElementById("a2").value;
  const eD=endDate(t); const eP=priceAt(t,eD);
  const out={_end:eD,_endP:valid(eP)?eP:null,_p1:null,_p2:null};
  if(!valid(eP)) return out;   // 끝점 가격이 없으면 계산 불가 → 전부 null
  const d1=nearestOnOrBefore(t,a1), d2=nearestOnOrBefore(t,a2);
  const p1=d1?priceAt(t,d1):null, p2=d2?priceAt(t,d2):null;
  out._p1=valid(p1)?p1:null; out._p2=valid(p2)?p2:null;
  out.a1=valid(p1)?pct(eP,p1):null;
  out.a2=valid(p2)?pct(eP,p2):null;
  ROLL.forEach(r=>{const bd=nBack(t,eD,r.n); const bp=bd?priceAt(t,bd):null;
    out[r.key]=valid(bp)?pct(eP,bp):null;});
  return out;
}
function rsLineSeries(ticker, market, days){
  // 종목종가 ÷ 지수종가 시계열 (최근 days 거래일). 추세 보기용.
  const sp=DB.prices[ticker], ip=DB.prices[market];
  if(!sp||!ip) return [];
  const dates=Object.keys(sp).filter(d=>ip[d]!=null).sort();
  const recent=dates.slice(-days);
  const out=[];
  recent.forEach(d=>{
    const s=sp[d], i=ip[d];
    if(valid(s)&&valid(i)&&i>0) out.push({d, v:s/i});
  });
  return out;
}
function sparkline(series, w, hgt){
  // series → 작은 SVG 선그래프 문자열
  if(!series||series.length<2) return "";
  const vals=series.map(p=>p.v);
  const mn=Math.min(...vals), mx=Math.max(...vals), rng=(mx-mn)||1;
  const n=series.length;
  const pts=series.map((p,i)=>{
    const x=(i/(n-1))*w;
    const y=hgt-((p.v-mn)/rng)*hgt;
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  const up=vals[vals.length-1]>=vals[0];
  const col=up?"rgb(var(--up))":"rgb(var(--down))";
  return `<svg width="${w}" height="${hgt}" viewBox="0 0 ${w} ${hgt}" style="display:block"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5"/></svg>`;
}
function bigRSChart(series, w, hgt){
  // 축·격자 있는 큰 RS Line SVG
  if(!series||series.length<2) return "<div style='padding:40px;text-align:center;color:#9096a1'>데이터 부족</div>";
  const vals=series.map(p=>p.v);
  const mn=Math.min(...vals), mx=Math.max(...vals), rng=(mx-mn)||1;
  const n=series.length, pad=30;
  const W=w, H=hgt;
  const plotW=W-pad*2, plotH=H-pad*1.5;
  const pts=series.map((p,i)=>{
    const x=pad+(i/(n-1))*plotW;
    const y=pad/2+plotH-((p.v-mn)/rng)*plotH;
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  const up=vals[vals.length-1]>=vals[0];
  const col=up?"rgb(var(--up))":"rgb(var(--down))";
  // 시작·끝 날짜
  const d0=series[0].d.slice(2), d1=series[series.length-1].d.slice(2);
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
    <line x1="${pad}" y1="${pad/2}" x2="${pad}" y2="${pad/2+plotH}" stroke="#e5e7eb"/>
    <line x1="${pad}" y1="${pad/2+plotH}" x2="${W-pad}" y2="${pad/2+plotH}" stroke="#e5e7eb"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2"/>
    <text x="${pad}" y="${H-6}" font-size="10" fill="#9096a1">${d0}</text>
    <text x="${W-pad}" y="${H-6}" font-size="10" fill="#9096a1" text-anchor="end">${d1}</text>
  </svg>`;
}
let rsModalState={tk:null,mk:null,nm:null,days:132};
const RSDAYLABEL={22:"1개월",66:"3개월",132:"6개월",250:"1년"};
function drawRSModal(){
  const {tk,mk,nm,days}=rsModalState;
  const series=rsLineSeries(tk, mk, days);
  const lbl=RSDAYLABEL[days]||days+"일";
  document.getElementById("rstitle").textContent=nm+" · RS Line";
  document.getElementById("rssub").textContent="종가 ÷ "+(mk==="KOSPI"?"코스피":"코스닥")+" 지수 · 최근 "+lbl+" 추세 (우상향=시장 이기는 중)";
  document.getElementById("rschart").innerHTML=bigRSChart(series, 520, 240);
  let trendTxt="데이터 부족";
  if(series.length>=2){
    const chg=(series[series.length-1].v/series[0].v-1)*100;
    const up=chg>=0;
    trendTxt=`추세: <b style="color:${up?'rgb(var(--up))':'rgb(var(--down))'}">${up?'우상향 ▲':'우하향 ▼'}</b> · ${lbl}간 RS ${chg>=0?'+':''}${chg.toFixed(1)}% ${up?'(시장보다 강해지는 중 — 주도주 신호)':'(시장보다 약해지는 중)'}`;
  }
  document.getElementById("rstrend").innerHTML=trendTxt;
  // 버튼 활성 표시
  document.querySelectorAll("#rsperiods button").forEach(b=>{
    b.classList.toggle("on", parseInt(b.dataset.days)===days);
  });
}
function openRSModal(tk, mk, nm){
  rsModalState={tk,mk,nm,days:132};  // 팝업 열면 6개월부터
  drawRSModal();
  document.getElementById("rsmodal").classList.add("on");
}
function rowValues(item){
  const t=item.ticker, mk=item.market;
  const a=computeReturns(t), b=computeReturns(mk);
  const v={_p1:a._p1,_p2:a._p2,_now:a._endP,abs:{},rel:{}};
  ["a1","a2",...ROLL.map(r=>r.key)].forEach(k=>{
    v.abs[k]=a[k];
    v.rel[k]=(a[k]==null||b[k]==null)?null:Math.round((a[k]-b[k])*100)/100;
  });
  // RS Score = 1M/3M/6M 상대강도의 가중합 (미너비니식 가중치)
  const r1=v.rel.M1, r3=v.rel.M3, r6=v.rel.M6;
  if(r1==null||r3==null||r6==null){
    v.rsScore=null;   // 기간 데이터 부족하면 점수 없음
  }else{
    v.rsScore=Math.round((RSW.w1*r1 + RSW.w3*r3 + RSW.w6*r6)*100)/100;
  }
  return v;
}
function benchValues(mk){const a=computeReturns(mk);
  const v={_p1:a._p1,_p2:a._p2,_now:a._endP,abs:{},rel:{}};
  ["a1","a2",...ROLL.map(r=>r.key)].forEach(k=>{v.abs[k]=a[k];v.rel[k]=0;});
  return v;}

function visibleItems(){return DB.universe.filter(s=>
  (state.mkt==="all"||s.market===state.mkt) && (state.sectors.length===0||state.sectors.includes(s.sector)));}
function fmt(v){return v==null?"–":(v>0?"+":"")+v.toFixed(2)+"%";}
function fmtP(v){return v==null?"–":Math.round(v).toLocaleString("ko-KR");}
function mkB(m){return m==="KOSPI"?'<span class="mk k">코스피</span>':'<span class="mk q">코스닥</span>';}
function mkColor(m){return m==="KOSPI"?'background:#eef2ff;color:#3949ab':'background:#fff3e0;color:#b45309';}

function maxAbs(rows,key){let m=0;rows.forEach(r=>{const v=r.vals[state.mode][key];if(v!=null&&Math.abs(v)>m)m=Math.abs(v);});return m||1;}
function cellBg(v,mx){if(v==null||v===0)return"transparent";const a=Math.min(Math.abs(v)/mx,1)*.82+.04;
  return v>0?`rgba(var(--up),${a.toFixed(3)})`:`rgba(var(--down),${a.toFixed(3)})`;}
function avg(arr){const v=arr.filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}

function renderRS(){
  // RS Score 전용 화면: 종목당 점수 1개 + 순위 + 상위%
  const broken=[];
  const items=visibleItems().map(it=>{
    try{ return {it,vals:rowValues(it)}; }
    catch(e){ broken.push(it); return null; }
  }).filter(x=>x!=null).filter(x=>{
    if(x.vals && x.vals._now!=null) return true;
    broken.push(x.it); return false;
  });
  // RS Score 있는 것만 순위 매김 (점수 높은 순)
  const scored=items.filter(x=>x.vals.rsScore!=null)
                    .sort((a,b)=>b.vals.rsScore-a.vals.rsScore);
  const noScore=items.filter(x=>x.vals.rsScore==null);  // 기간 부족(6개월 데이터 없는 신규상장 등)
  const N=scored.length;

  // 헤더
  let h2='<th class="name">종목</th><th class="nowc">현재가</th>'
       +'<th>RS Score</th><th>1달</th><th>3달</th><th>6달</th><th>순위</th><th>상위%</th><th>RS추세(6달)</th>';
  let b="";
  scored.forEach((row,i)=>{
    const it=row.it, v=row.vals;
    const rank=i+1;
    const pctRank=Math.round((rank/N)*100);  // 상위 몇 %
    const top10 = pctRank<=10;
    const mk = (it.market==="KOSPI")?'<span class="mk k">코스피</span>':'<span class="mk q">'+(it.market||"-")+'</span>';
    const sc=v.rsScore;
    const scColor = sc>0?'color:rgb(var(--up));font-weight:700':sc<0?'color:rgb(var(--down));font-weight:700':'';
    const topBadge = top10?'<span class="topbadge">TOP'+pctRank+'%</span>':'';
    let r=`<td class="name"><b><span class="rank">${rank}</span>${it.name||it.ticker}</b>${mk}<span class="sct">${it.sector||""}</span><div class="tkr">${it.ticker}</div></td>`;
    r+=`<td class="price nowc">${fmtP(v._now)}</td>`;
    r+=`<td style="${scColor}">${(sc>0?'+':'')+sc.toFixed(2)}${topBadge}</td>`;
    r+=`<td>${fmt(v.rel.M1)}</td><td>${fmt(v.rel.M3)}</td><td>${fmt(v.rel.M6)}</td>`;
    r+=`<td><b>${rank}위</b></td>`;
    r+=`<td>${top10?'<b style="color:rgb(var(--up))">상위 '+pctRank+'%</b>':'상위 '+pctRank+'%'}</td>`;
    const series=rsLineSeries(it.ticker, it.market, 132);
    r+=`<td class="sparkcell" data-tk="${it.ticker}" data-mk="${it.market}" data-nm="${it.name||it.ticker}" title="클릭하면 크게 보기">${sparkline(series,80,24)}</td>`;
    b+=`<tr${top10?' style="background:rgba(var(--up),0.06)"':''}>${r}</tr>`;
  });
  // 점수 없는 종목 (데이터 부족)
  noScore.forEach(row=>{
    const it=row.it,v=row.vals;
    const mk = (it.market==="KOSPI")?'<span class="mk k">코스피</span>':'<span class="mk q">'+(it.market||"-")+'</span>';
    let r=`<td class="name"><b>${it.name||it.ticker}</b>${mk}<span class="sct">${it.sector||""}</span><div class="tkr">${it.ticker}</div></td>`;
    r+=`<td class="price nowc">${fmtP(v._now)}</td>`;
    r+=`<td style="color:#9096a1">–</td><td>${fmt(v.rel.M1)}</td><td>${fmt(v.rel.M3)}</td><td>${fmt(v.rel.M6)}</td><td>–</td><td style="color:#9096a1">데이터부족</td><td></td>`;
    b+=`<tr>${r}</tr>`;
  });

  const wInfo=`<div class="rsinfo">RS Score = (1달 RS × ${RSW.w1}) + (3달 RS × ${RSW.w3}) + (6달 RS × ${RSW.w6}) · 미너비니식 가중치(최근 중시) · 점수 높을수록 시장 주도주 · 총 ${N}종목 중 순위</div>`;

  let brokenHtml="";
  const dropList=(DB.dropped||[]).map(d=>`${d.name}(${d.ticker})`);
  const brokenList=broken.map(it=>`${it.name}(${it.ticker})`);
  const allBroken=[...new Set([...brokenList,...dropList])];
  if(allBroken.length){
    brokenHtml=`<div class="broken">⚠️ 데이터가 부족해 표시하지 못한 종목: <b>${allBroken.join(", ")}</b></div>`;
  }
  document.getElementById("mount").innerHTML=`${wInfo}<div class="card"><div class="scroll"><table><thead><tr>${h2}</tr></thead><tbody>${b}</tbody></table></div></div>${brokenHtml}`;
}

function buildSectorPanel(){
  const sectors=[...new Set(DB.universe.map(s=>s.sector))].sort();
  const panel=document.getElementById("sectorPanel");
  if(!panel) return;
  // "전체" 행 + 구분선 + 섹터별 체크박스
  let html='<label class="allrow"><input type="checkbox" id="secAll" '+(state.sectors.length===0?'checked':'')+'> 전체 섹터</label>';
  html+='<div class="divider"></div>';
  sectors.forEach(sc=>{
    const on=state.sectors.includes(sc);
    const safe=sc.replace(/"/g,'&quot;');
    html+='<label><input type="checkbox" class="secChk" value="'+safe+'" '+(on?'checked':'')+'> '+sc+'</label>';
  });
  panel.innerHTML=html;
  updateSectorBtn();
}
function updateSectorBtn(){
  const btn=document.getElementById("sectorBtn");
  if(!btn) return;
  if(state.sectors.length===0){ btn.textContent="전체 섹터"; }
  else if(state.sectors.length===1){ btn.textContent=state.sectors[0]; }
  else { btn.textContent=state.sectors.length+"개 섹터 선택"; }
}
function onSectorChange(){
  buildSectorPanel();   // 체크 상태 다시 그림
  render();
}
function render(){
  if(!DB)return;
  if(state.mode==="rs"){ renderRS(); return; }   // RS Score 모드는 전용 화면
  const broken=[];
  const items=visibleItems().map(it=>{
    try{ return {it,vals:rowValues(it)}; }
    catch(e){ broken.push(it); return null; }
  }).filter(x=>x!=null)
    .filter(x=>{ // 가격이 아예 없으면 깨진 걸로 분류
      if(x.vals && x.vals._now!=null) return true;
      broken.push(x.it); return false;
    });
  const mxs={};COLS.forEach(c=>mxs[c.key]=maxAbs(items,c.key));
  const a1l=document.getElementById("a1").value.slice(5).replace("-","/");
  const a2l=document.getElementById("a2").value.slice(5).replace("-","/");

  // head
  let h='<th class="name">종목</th>';
  if(state.showPrice)h+=`<th>가격①<div class="tkr">${a1l}</div></th><th>가격②<div class="tkr">${a2l}</div></th><th class="nowc sep">현재가</th>`;
  COLS.forEach(c=>{const ar=state.sortKey===c.key?`<span class="arrow">${state.sortDir<0?"▼":"▲"}</span>`:"";
    const cls=(c.anc?c.anc+" anc ":"")+(c.sep?"sep":"");
    h+=`<th data-k="${c.key}" class="${cls}">${c.label}${ar}</th>`;});

  let b="";
  const colspan = 1 + (state.showPrice?3:0) + COLS.length;

  // 지수(벤치) 행 — 항상 위에
  (state.mkt==="all"?["KOSPI","KOSDAQ"]:[state.mkt]).forEach(mk=>{
    const bd=DB.benchmarks.find(x=>x.ticker===mk); if(!bd)return;
    const v=benchValues(mk);
    let r=`<td class="name"><b>${bd.name}</b><span class="tag">기준</span></td>`;
    if(state.showPrice)r+=`<td class="price">${fmtP(v._p1)}</td><td class="price">${fmtP(v._p2)}</td><td class="price nowc sep">${fmtP(v._now)}</td>`;
    COLS.forEach(c=>{r+=`<td class="${c.sep?'sep':''}">${fmt(v[state.mode][c.key])}</td>`;});
    b+=`<tr class="bm">${r}</tr>`;
  });

  function rowHTML(row,rank){
    try{
      const it=row.it,v=row.vals;
      const mk = (it.market==="KOSPI")?'<span class="mk k">코스피</span>':(it.market==="KOSDAQ")?'<span class="mk q">코스닥</span>':`<span class="mk q">${it.market||"-"}</span>`;
      let r=`<td class="name"><b><span class="rank">${rank}</span>${it.name||it.ticker}</b>${mk}<span class="sct">${it.sector||""}</span><div class="tkr">${it.ticker}</div></td>`;
      if(state.showPrice)r+=`<td class="price">${fmtP(v._p1)}</td><td class="price">${fmtP(v._p2)}</td><td class="price nowc sep">${fmtP(v._now)}</td>`;
      COLS.forEach(c=>{const val=v[state.mode]?v[state.mode][c.key]:null;r+=`<td class="${c.sep?'sep':''}" style="background:${cellBg(val,mxs[c.key])}">${fmt(val)}</td>`;});
      return `<tr>${r}</tr>`;
    }catch(e){ return ""; }  // 한 종목 렌더 실패해도 빈 줄 반환, 전체는 계속
  }

  if(state.groupBy==="none"){
    const sorted=[...items].sort((x,y)=>{const a=x.vals[state.mode][state.sortKey],bb=y.vals[state.mode][state.sortKey];
      if(a==null)return 1;if(bb==null)return -1;return (a-bb)*state.sortDir;});
    sorted.forEach((row,i)=>b+=rowHTML(row,i+1));
  } else {
    // 그룹 = 시장 · 섹터
    const groups={};
    items.forEach(row=>{const key=row.it.market+" · "+row.it.sector;(groups[key]=groups[key]||[]).push(row);});
    // 그룹 정렬: 그룹 평균(현재 정렬 컬럼) 높은 순
    const groupKeys=Object.keys(groups).sort((ka,kb)=>{
      const ma=avg(groups[ka].map(r=>r.vals[state.mode][state.sortKey]));
      const mb=avg(groups[kb].map(r=>r.vals[state.mode][state.sortKey]));
      return (mb??-1e9)-(ma??-1e9);
    });
    groupKeys.forEach(gk=>{
      const rows=groups[gk];
      const mkt=rows[0].it.market, sector=rows[0].it.sector;
      const isCol=state.collapsed[gk];
      // 그룹 헤더
      let gh=`<td class="name"><span class="caret">${isCol?'▸':'▾'}</span><span class="gmk" style="${mkColor(mkt)}">${mkt==="KOSPI"?"코스피":"코스닥"}</span>${sector}<span class="gcount">${rows.length}종목</span></td>`;
      if(state.showPrice)gh+=`<td></td><td></td><td class="sep"></td>`;
      COLS.forEach(c=>{const gv=avg(rows.map(r=>r.vals[state.mode][c.key]));
        const col=gv==null?'':(gv>0?'color:rgb(var(--up))':gv<0?'color:rgb(var(--down))':'');
        gh+=`<td class="${c.sep?'sep':''}" style="${col}">${gv==null?'–':(gv>0?'+':'')+gv.toFixed(2)+'%'}</td>`;});
      b+=`<tr class="grphead" data-gk="${gk}">${gh}</tr>`;
      // 그룹 내 종목 (정렬)
      if(!isCol){
        const sorted=[...rows].sort((x,y)=>{const a=x.vals[state.mode][state.sortKey],bb=y.vals[state.mode][state.sortKey];
          if(a==null)return 1;if(bb==null)return -1;return (a-bb)*state.sortDir;});
        sorted.forEach((row,i)=>b+=rowHTML(row,i+1));
      }
    });
  }

  let brokenHtml="";
  // 화면 계산 중 깨진 것 + 수집 단계에서 빠진 것(dropped) 합치기
  const dropList=(DB.dropped||[]).map(d=>`${d.name}(${d.ticker})`);
  const brokenList=broken.map(it=>`${it.name}(${it.ticker})`);
  const allBroken=[...new Set([...brokenList,...dropList])];
  if(allBroken.length){
    brokenHtml=`<div class="broken">⚠️ 데이터가 부족해 표시하지 못한 종목: <b>${allBroken.join(", ")}</b><br><span style="font-size:11px;color:#9096a1">최근 상장·분할·액면변경·거래정지 등으로 가격 데이터가 충분치 않을 수 있어요. 나머지 종목은 정상 표시됩니다.</span></div>`;
  }
  document.getElementById("mount").innerHTML=`<div class="card"><div class="scroll"><table><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table></div></div>${brokenHtml}`;
  document.querySelectorAll("#mount th[data-k]").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;if(state.sortKey===k)state.sortDir*=-1;else{state.sortKey=k;state.sortDir=-1;}render();});
  document.querySelectorAll("#mount tr.grphead").forEach(tr=>tr.onclick=()=>{
    const gk=tr.dataset.gk;state.collapsed[gk]=!state.collapsed[gk];render();});
}

function bind(id,attr,fn){document.getElementById(id).onclick=e=>{const val=e.target.dataset[attr];if(val===undefined)return;
  fn(val);document.querySelectorAll(`#${id} button`).forEach(x=>x.classList.toggle("on",x===e.target));render();};}

async function init(){
  try{
    const res=await fetch("data.json"); if(!res.ok)throw new Error("data.json 못 읽음 ("+res.status+")");
    DB=await res.json();
  }catch(err){
    document.getElementById("mount").innerHTML=`<div class="err"><b>데이터 로딩 실패:</b> ${err.message}<br>
    이 파일은 data.json과 같은 폴더에 두고 <b>로컬 서버</b>로 열어야 합니다. 예) <code>python3 -m http.server</code> 후 <code>localhost:8000</code></div>`;
    document.getElementById("sub").textContent="데이터 로딩 실패";return;
  }
  // 섹터 다중선택 체크박스 패널 생성
  buildSectorPanel();

  const allDates=Object.values(DB.prices).flatMap(p=>Object.keys(p));
  const minD=allDates.sort()[0], maxD=allDates.sort()[allDates.length-1];
  const a1=document.getElementById("a1"), a2=document.getElementById("a2"), ep=document.getElementById("endpick");
  a1.min=a2.min=ep.min=minD; a1.max=a2.max=ep.max=maxD;
  a1.value="2026-04-30"; a2.value="2026-05-20"; ep.value=maxD;
  document.getElementById("sub").textContent=`실데이터 ${minD} ~ ${maxD} · ${DB.universe.length}종목 · 섹터별 그룹 · 끝점·구간 바꾸면 즉석 재계산`;
  [a1,a2,ep].forEach(el=>el.onchange=render);
  bind("mkt","mkt",v=>state.mkt=v);
  bind("mode","mode",v=>state.mode=v);
  bind("price","price",v=>state.showPrice=(v==="on"));
  bind("groupby","grp",v=>state.groupBy=v);
  bind("endmode","end",v=>{state.endMode=v;ep.style.display=(v==="pick")?"inline-block":"none";});
  render();
}
init();

// RS Line 팝업 이벤트 (위임)
document.addEventListener("click", function(e){
  // 섹터 드롭다운 버튼 → 펼치기/접기
  if(e.target.id==="sectorBtn"){
    document.getElementById("sectorPanel").classList.toggle("on");
    e.stopPropagation(); return;
  }
  // 패널 바깥 클릭 → 닫기
  const panel=document.getElementById("sectorPanel");
  if(panel && panel.classList.contains("on") && !e.target.closest("#sectorMsel")){
    panel.classList.remove("on");
  }
  const cell=e.target.closest(".sparkcell");
  if(cell){ openRSModal(cell.dataset.tk, cell.dataset.mk, cell.dataset.nm); return; }
  if(e.target.id==="rsclose" || e.target.id==="rsmodal"){
    document.getElementById("rsmodal").classList.remove("on");
  }
  const pb=e.target.closest("#rsperiods button");
  if(pb){ rsModalState.days=parseInt(pb.dataset.days); drawRSModal(); }
});

// 섹터 체크박스 변경 처리
document.addEventListener("change", function(e){
  if(e.target.id==="secAll"){
    state.sectors=[];   // 전체 선택 = 빈 배열
    onSectorChange();
  } else if(e.target.classList && e.target.classList.contains("secChk")){
    const v=e.target.value;
    const i=state.sectors.indexOf(v);
    if(e.target.checked){ if(i<0) state.sectors.push(v); }
    else { if(i>=0) state.sectors.splice(i,1); }
    onSectorChange();
  }
});
</script>
