name: 키움 인증 테스트

# 수동으로만 실행 (Actions 탭에서 Run workflow 버튼)
on:
  workflow_dispatch:

jobs:
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 키움 인증 테스트 실행
        env:
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_SECRET_KEY: ${{ secrets.KIWOOM_SECRET_KEY }}
        run: python test_kiwoom.py
